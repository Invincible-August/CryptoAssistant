# Nginx 本地部署配置
# 用于生产环境前后端分离部署（可选，开发时不需要）
#
# 使用方法：
#   1. 本地安装 Nginx
#   2. 将此文件复制到 Nginx 配置目录（如 /etc/nginx/conf.d/ 或 C:/nginx/conf/）
#   3. 修改 root 路径指向前端 dist 目录
#   4. 修改 proxy_pass 指向后端实际地址
#   5. 重启 Nginx

server {
    listen 80;
    server_name localhost;

    # 前端静态文件 - 需要先执行 cd frontend && npm run build
    # Windows 示例: root D:/otherProject/TradingAgent/frontend/dist;
    # Linux 示例:   root /opt/TradingAgent/frontend/dist;
    root /opt/TradingAgent/frontend/dist;
    index index.html;

    # 前端路由 - SPA回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API代理到后端（本地运行的 uvicorn）
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket代理
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
