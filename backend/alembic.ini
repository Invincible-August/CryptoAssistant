# Alembic 配置文件
# 用于管理数据库迁移的核心配置

[alembic]
# 迁移脚本存放路径
script_location = migrations

# 迁移文件命名模板，使用时间戳前缀确保排序正确
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 数据库连接地址（生产环境请通过环境变量覆盖，切勿在此处填写真实密码）
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/crypto_assistant

# 时区配置
timezone = UTC

# 是否在生成迁移时进行 schema 对比
# compare_type = true

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
