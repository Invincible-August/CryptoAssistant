# Alembic configuration (ASCII-only comments so ConfigParser works on all Windows locales).

[alembic]
# Migration scripts directory (relative to this file)
script_location = migrations

# Filename template for new revisions (timestamp prefix for ordering)
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Default DB URL; override with DATABASE_URL env var (never put production secrets here)
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/crypto_assistant

timezone = UTC

# compare_type = true

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
